<style>

<body>
<div id="loading">
  <svg width="30" height="30" viewBox="0 0 100 100" fill="none"><polygon points="14,93 27,93 44,12 31,12" fill="#fff"/><polygon points="86,93 73,93 56,12 69,12" fill="#fff"/><rect x="46.5" y="6" width="7" height="88" fill="#C9A24A"/></svg>
  <div class="spinner"></div>
  <p style="color:#5A5E6B;font-size:.78rem;font-family:'JetBrains Mono',monospace;letter-spacing:.1em">CARREGANDO...</p>
</div>
<div id="error-wrap" style="display:none">
  <div style="font-size:2.5rem">&#x26A0;&#xFE0F;</div>
  <h2 id="err-title" style="font-family:'Space Grotesk',sans-serif;font-weight:700;margin-top:8px"></h2>
  <p id="err-msg" style="color:#5A5E6B;max-width:420px;line-height:1.6;font-size:.88rem;margin-top:8px"></p>
</div>
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="logo-wrap">
        <svg width="26" height="26" viewBox="0 0 100 100" fill="none"><polygon points="14,93 27,93 44,12 31,12" fill="#fff"/><polygon points="86,93 73,93 56,12 69,12" fill="#fff"/><rect x="46.5" y="6" width="7" height="88" fill="#C9A24A"/></svg>
        <span class="wordmark">HUVEN</span>
      </div>
      <div class="divider-v"></div>
      <div class="cliente-info">
        <div class="nome" id="cliente-nome"></div>
        <div class="sub" id="cliente-sub">FUNIL COMERCIAL</div>
      </div>
    </div>
    <div class="header-right">
      <div class="mes-selector" id="mes-selector"></div>
      <button id="btn-export" onclick="window.print()">&#x2193; PDF</button>
    </div>
  </div>
  <div id="alertas-wrap"></div>
  <div class="slabel">Financeiro</div>
  <div class="metrics-row" id="mfin"></div>
  <div class="slabel">Comercial</div>
  <div class="metrics-row" id="mcom"></div>
  <div class="grid2">
    <div class="box"><div class="box-title">Funil de Vendas</div><div class="funil-wrap" id="funil"></div></div>
    <div class="box"><div class="box-title">Por Etapa</div><div class="chart-wrap"><canvas id="chart"></canvas></div></div>
  </div>
  <div class="fontes-box"><div class="box-title">Analise por Fonte de Lead</div><div id="fontes"></div></div>
  <div class="medidas"><div class="box-title" style="color:#C9A24A;margin-bottom:.75rem">&#x26A1; Medidas Imediatas</div><div id="medidas"></div></div>
  <div class="diag"><div class="box-title">Diagnostico Detalhado</div><div id="diag"></div></div>
  <div class="leads-box"><div class="box-title">Leads em Conversa <span id="conv-ct" style="color:#fbbf24;font-weight:400;margin-left:6px"></span></div><div id="leads"></div></div>
  <footer>HUVEN · Funil Comercial · Dados em tempo real via Google Sheets</footer>
</div>
<script>
var CORES=['#C9A24A','#B8933E','#A08238','#7A6230','#44ff88'];
var MESES={'janeiro':0,'fevereiro':1,'marco':2,'abril':3,'maio':4,'junho':5,'julho':6,'agosto':7,'setembro':8,'outubro':9,'novembro':10,'dezembro':11};

// Default column positions (fallback when auto-detection fails)
var COL_DEFAULT={CHEGADA:0,NOME:1,TELEFONE:2,TRATATIVA:3,REDE:4,STATUS:5,FECHARAM:6,VALOR:7,AVALIACAO:-1,COMP_COL:-1};

function parseLine(line){
  var cells=[],cur='',inQ=false;
  for(var j=0;j<line.length;j++){
    var c=line[j];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){cells.push(cur.trim());cur='';}
    else{cur+=c;}
  }
  cells.push(cur.trim());
  return cells;
}

// Auto-detect column indices from header row
function detectCols(headers){
  var c=JSON.parse(JSON.stringify(COL_DEFAULT));
  if(!headers||!headers.length)return c;
  headers.forEach(function(h,i){
    var hn=norm(h);
    // FUNIL/STATUS — prefer FUNIL keyword (more specific)
    if(hn==='FUNIL'||hn.indexOf('FUNIL')===0){c.STATUS=i;}
    else if((hn==='STATUS'||hn.indexOf('STATUS')===0)&&c.STATUS===5){c.STATUS=i;}
    else if(hn.indexOf('ETAPA')>=0||hn.indexOf('SITUACAO')>=0){c.STATUS=i;}
    // NOME
    if(hn.indexOf('NOME')>=0&&hn.indexOf('USUARIO')<0){c.NOME=i;}
    else if(hn.indexOf('PACIENTE')>=0||hn.indexOf('CLIENTE')>=0){c.NOME=i;}
    // TELEFONE
    if(hn.indexOf('TELEFONE')>=0||hn.indexOf('CELULAR')>=0||hn.indexOf('FONE')>=0||hn.indexOf('WHATSAPP')>=0){c.TELEFONE=i;}
    // CHEGADA
    if(hn.indexOf('CHEGADA')>=0||(hn.indexOf('DATA')>=0&&hn.length<8)){c.CHEGADA=i;}
    // FECHARAM
    if(hn.indexOf('FECHARAM')>=0||hn.indexOf('FECHOU')>=0||hn.indexOf('VENDEU')>=0){c.FECHARAM=i;}
    // VALOR
    if(hn.indexOf('VALOR')>=0||hn.indexOf('TICKET')>=0||hn.indexOf('RECEITA')>=0){c.VALOR=i;}
    // TRATATIVA
    if(hn.indexOf('TRATATIVA')>=0||hn.indexOf('OBSERVA')>=0){c.TRATATIVA=i;}
    // REDE / canal / categoria
    if(hn.indexOf('REDE')>=0||hn.indexOf('CANAL')>=0||hn.indexOf('ORIGEM')>=0||hn.indexOf('FONTE')>=0
       ||hn.indexOf('IMPLANTE')>=0||hn.indexOf('PROCEDIMENTO')>=0||hn.indexOf('CATEGORIA')>=0){c.REDE=i;}
    // AVALIACAO / compareceu
    if(hn.indexOf('AVALIAC')>=0||hn.indexOf('AVALIAG')>=0){c.AVALIACAO=i;}
    if(hn==='COMPARECEU'){c.COMP_COL=i;}
  });
  return c;
}

// Retorna {headers, rows, cols} com deteccao automatica de colunas
function parseCSV(txt){
  var lines=txt.replace(/\r/g,'').split('\n');
  var nonEmpty=[];
  for(var i=0;i<lines.length;i++){var l=lines[i].trim();if(l)nonEmpty.push(l);}
  if(!nonEmpty.length)return{headers:null,rows:[],cols:COL_DEFAULT};

  // Detect which lines are headers vs data
  // Row 0: often "ClientName - Company  COL1","COL2"... (combined title+headers) OR pure title
  // Row 1: headers OR first data row
  var r0=parseLine(nonEmpty[0]);
  var r1=nonEmpty[1]?parseLine(nonEmpty[1]):null;
  var headers=null,dataStart=1;

  // Check if row 0 first cell looks like a date (data row) or a title/header
  var r0first=norm(r0[0]||'');
  var looksLikeDate=r0first.match(/^\d{2}[\/-]\d{2}[\/-]\d{4}$|^\d{4}[\/-]\d{2}/);

  if(looksLikeDate){
    // Row 0 is already data — no header detected, use defaults
    headers=null;dataStart=0;
  } else {
    // Check if row 0 contains column keywords (combined title+headers like Raquel)
    var r0keywords=0;
    ['NOME','TELEFONE','FUNIL','STATUS','CHEGADA','DATA','FECHARAM','VALOR','PACIENTE'].forEach(function(k){
      r0.forEach(function(c){if(norm(c).indexOf(k)>=0)r0keywords++;});
    });
    if(r0keywords>=2){
      // Row 0 is header row (Raquel style)
      headers=r0;dataStart=1;
    } else if(r1){
      // Row 0 is pure title, row 1 is headers (Arte Azulejo style)
      var r1keywords=0;
      ['NOME','TELEFONE','FUNIL','STATUS','CHEGADA','DATA','FECHARAM','VALOR','PACIENTE'].forEach(function(k){
        r1.forEach(function(c){if(norm(c).indexOf(k)>=0)r1keywords++;});
      });
      if(r1keywords>=2){headers=r1;dataStart=2;}
      else{headers=null;dataStart=1;}
    }
  }

  var cols=detectCols(headers);
  var rows=[];
  for(var i=dataStart;i<nonEmpty.length;i++){
    var cells=parseLine(nonEmpty[i]);
    if(!cells.some(function(x){return x;}))continue;
    // Skip if this looks like another header row
    var firstNorm=norm(cells[cols.NOME]||cells[1]||'');
    if(firstNorm==='NOME DO LEAD'||firstNorm==='NOME'||firstNorm==='NOME PACIENTE')continue;
    rows.push(cells);
  }
  return{headers:headers,rows:rows,cols:cols};
}

function norm(s){
  return (s||'').toUpperCase().trim()
    .normalize('NFD')
    .replace(/[̀-ͯ]/g,'')
    .replace(/\s+/g,' ');
}

function parseMoney(s){
  var str=(s||'').replace(/[^0-9,.]/g,'');
  if(!str)return 0;
  // Brazilian: 6.000 = 6000 (period=thousands), 1.500,00 = 1500 (comma=decimal)
  if(/,\d{1,2}$/.test(str)){
    // ends with comma+digits = decimal comma format: 1.500,00
    str=str.replace(/\./g,'').replace(',','.');
  } else if(/\.\d{3}/.test(str)){
    // period followed by 3 digits = thousands separator: 6.000
    str=str.replace(/\./g,'');
  } else {
    str=str.replace(/,/g,'');
  }
  return parseFloat(str)||0;
}
function fmtM(v){return v>0?'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}):null;}
function pct(a,b){return b>0?Math.round(a/b*100):0;}

var STATUS_ETAPA={
  'NAO RESPONDEU':1,'NAO RESPONDEU ':1,
  'RESPONDEU E NAO AGENDOU':2,'RESPONDEU E NAO AGENDOU ':2,
  'EM CONVERSA':2,'CONVERSANDO':2,'CONVERSANDO ':2,
  'SIM REPONDEU':2,'SIM RESPONDEU':2,'SIM REPONDEU ':2,'SIM RESPONDEU ':2,
  'AGENDADO':3,'AGENDADO ':3,
  'AGENDOU E NAO COMPARECEU':3,'AGENDOU E NAO COMPARECEU ':3,
  'COMPARECEU E NAO FECHOU':4,'COMPARECEU E NAO FECHOU ':4,
  'COMPARECEU E FECHOU':5,'COMPARECEU E FECHOU ':5
};

function calcular(data){
  var rows=Array.isArray(data)?data:(data.rows||[]);
  var C=Array.isArray(data)?COL_DEFAULT:(data.cols||COL_DEFAULT);
  var total=0,respondeu=0,agendou=0,compareceu=0,fechou=0,valorTotal=0;
  var emConversa=[],fontes={},q={semStatus:0,semTel:0,semNome:0,fechSemValor:0};
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var st=norm(r[C.STATUS]||''),etapa=STATUS_ETAPA[st]||0;
    if(!r[C.NOME]&&!(r[C.STATUS])&&!r[C.CHEGADA])continue;
    total++;
    if(!r[C.STATUS]||!st)q.semStatus++;
    if(!r[C.TELEFONE])q.semTel++;
    if(!r[C.NOME])q.semNome++;
    // Boost etapa with auxiliary columns (AVALIACAO, COMP_COL)
    if(etapa<4&&C.AVALIACAO>=0&&norm(r[C.AVALIACAO]||'')==='SIM')etapa=Math.max(etapa,4);
    if(etapa<4&&C.COMP_COL>=0&&norm(r[C.COMP_COL]||'')==='SIM')etapa=Math.max(etapa,4);
    if(etapa>=2)respondeu++;
    if(etapa>=3)agendou++;
    if(etapa>=4)compareceu++;
    var fech=norm(r[C.FECHARAM]||'');
    var fechouFlag=etapa>=5||fech==='SIM';
    if(fechouFlag){
      fechou++;
      var v=parseMoney(r[C.VALOR]);
      valorTotal+=v;
      if(v===0)q.fechSemValor++;
    }
    var emConvFlag=st==='EM CONVERSA'||st==='CONVERSANDO'||st==='CONVERSANDO ';
    if(emConvFlag){
      emConversa.push({nome:r[C.NOME]||'-',tel:r[C.TELEFONE]||'-',chegada:r[C.CHEGADA]||'-',tratativa:r[C.TRATATIVA]||''});
    }
    var fonte=(r[C.REDE]||'').trim()||'Nao informado';
    if(!fontes[fonte])fontes[fonte]={total:0,fechou:0,valor:0};
    fontes[fonte].total++;
    if(fechouFlag){fontes[fonte].fechou++;fontes[fonte].valor+=parseMoney(r[C.VALOR]);}
  }
  var tMedio=fechou>0?Math.round(valorTotal/fechou):0;
  return{total:total,respondeu:respondeu,agendou:agendou,compareceu:compareceu,fechou:fechou,
    valorTotal:valorTotal,tMedio:tMedio,emConversa:emConversa,fontes:fontes,qualidade:q,
    respondRate:pct(respondeu,total),agendRate:pct(agendou,respondeu),
    showUpRate:pct(compareceu,agendou),closeRate:pct(fechou,compareceu),convGeral:pct(fechou,total)};
}

function normMes(s){return norm(s).toLowerCase();}

function getDiasRestantes(abaName,hoje){
  var parts=normMes(abaName||'').split(' ');
  var mesNome=parts[0],ano=parseInt(parts[1]);
  var mesIdx=MESES[mesNome];
  if(mesIdx===undefined||isNaN(ano))return 30;
  var mesAtual=hoje.getMonth(),anoAtual=hoje.getFullYear();
  if(mesIdx===mesAtual&&ano===anoAtual){
    var diasNoMes=new Date(ano,mesIdx+1,0).getDate();
    return Math.max(1,diasNoMes-hoje.getDate()+1);
  }
  if(ano>anoAtual||(ano===anoAtual&&mesIdx>mesAtual)){
    return new Date(ano,mesIdx+1,0).getDate();
  }
  return 0;
}

function getDiaDecorridos(abaName,hoje){
  var parts=normMes(abaName||'').split(' ');
  var mesNome=parts[0],ano=parseInt(parts[1]);
  var mesIdx=MESES[mesNome];
  if(mesIdx===undefined||isNaN(ano))return 15;
  var mesAtual=hoje.getMonth(),anoAtual=hoje.getFullYear();
  if(mesIdx===mesAtual&&ano===anoAtual)return Math.max(1,hoje.getDate()-1);
  return new Date(ano,mesIdx+1,0).getDate();
}

function calcProj(m,metaF,metaR,custoLead,abaName){
  var hoje=new Date();
  var usarR=metaR>0&&!metaF;
  var metaV=usarR?metaR:metaF;
  var atual=usarR?m.valorTotal:m.fechou;
  if(!metaV)return null;
  var pctMeta=Math.min(100,Math.round(atual/metaV*100));
  if(pctMeta>=100)return{atingida:true,tipo:usarR?'receita':'fechamentos',meta:metaV,atual:atual,pctMeta:100};
  var falta=metaV-atual;
  var cr=Math.max(0.05,m.closeRate/100);
  var sr=Math.max(0.05,m.showUpRate/100);
  var ar=Math.max(0.05,m.agendRate/100);
  var rr=Math.max(0.05,m.respondRate/100);
  var fechFaltam=usarR?(m.tMedio>0?Math.ceil(falta/m.tMedio):0):falta;
  var comparecerN=Math.ceil(fechFaltam/cr);
  var agendarN=Math.ceil(comparecerN/sr);
  var responderN=Math.ceil(agendarN/ar);
  var leadsN=Math.ceil(responderN/rr);
  var invest=custoLead?Math.ceil(leadsN*custoLead):null;
  var recEsp=fechFaltam*m.tMedio;
  var roi=invest&&invest>0&&m.tMedio>0?Math.round((recEsp/invest-1)*100):null;
  var diasR=getDiasRestantes(abaName,hoje);
  var diasD=getDiaDecorridos(abaName,hoje);
  var leadsDia=Math.ceil(leadsN/Math.max(1,diasR));
  var ritmAtual=diasD>0?m.total/diasD:0;
  var diasParaMeta=ritmAtual>0?Math.ceil(leadsN/ritmAtual):null;
  return{atingida:false,tipo:usarR?'receita':'fechamentos',meta:metaV,atual:atual,pctMeta:pctMeta,
    falta:falta,fechFaltam:fechFaltam,comparecerN:comparecerN,agendarN:agendarN,leadsN:leadsN,
    invest:invest,roi:roi,recEsp:recEsp,diasR:diasR,leadsDia:leadsDia,
    ritmAtual:Math.round(ritmAtual*10)/10,diasParaMeta:diasParaMeta};
}

function dH(atual,ant){
  if(ant===undefined||ant===null||ant===0&&atual===0)return'';
  var diff=atual-ant;
  if(Math.abs(diff)<0.5)return' <span class="delta flat">&#x2192; estavel</span>';
  var p=ant>0?Math.abs(Math.round(diff/ant*100)):0;
  var cls=diff>0?'up':'down',arrow=diff>0?'&#x2191;':'&#x2193;';
  return' <span class="delta '+cls+'">'+arrow+(p?p+'%':'')+'</span>';
}

    d:'Volume de lead nao e qualidade de lead. O canal que traz 50 leads com 2% de conversao e pior do que o canal que traz 10 leads com 20%. A maioria das empresas otimiza para volume, nao para qualidade.',
    a:'Olha a tabela de fontes acima. Qual canal tem o maior close rate? Dobra o investimento nele essa semana. Qual tem o pior? Reduz ou pausa ate entender o motivo.'
  });

  itens.push({urgente:false,
    t:'Grava uma reuniao de vendas essa semana e assiste com a equipe',
    d:'Nao da para melhorar o que nao se observa. A maioria dos problemas de close rate estao visiveis na gravacao — pergunta que nao foi feita, objecao que nao foi tratada, proposta que chegou cedo demais.',
    a:'Pede permissao ao lead para gravar ("Para garantir que nao percamos nenhum detalhe, posso gravar?"). Assiste com a equipe. Identifica 3 pontos de melhoria. Aplica na proxima semana.'
  });

  itens.push({urgente:false,
    t:'Define o proximo passo de cada lead ANTES de encerrar a conversa',
    d:'Conversa sem proximo passo agendado e conversa perdida. O lead sai da reuniao sem compromisso e a probabilidade de fechar cai para menos de 20%. O follow-up nao pode depender de lembranca — tem que estar marcado.',
    a:'Regra nova a partir de hoje: nenhuma reuniao encerra sem data e hora do proximo passo confirmados. Se o lead nao confirmar, a reuniao nao terminou — ela travou.'
  });

  // Garante minimo de 7, maximo de 9
  document.getElementById('medidas').innerHTML=itens.slice(0,9).map(function(x,i){
    return'<div class="mi">'
      +'<div class="mn" style="'+(x.urgente?'background:rgba(255,68,68,.15);border-color:rgba(255,68,68,.3);color:#ff8888':'')+'">'+( i+1)+'</div>'
      +'<div><div class="mt" style="'+(x.urgente?'color:#ff8888':'')+'">'+x.t+'</div>'
      +'<div class="md">'+x.d+'</div>'
      +'<div class="ma">'+x.a+'</div>'
      +'</div></div>';
  }).join('');
}

function rDiag(m,ant){
  var a=ant||{},itens=[];
  if(m.respondRate>=80)itens.push({i:'&#x2705;',t:'Abordagem inicial forte ('+m.respondRate+'%)',d:'Mante o padrao.'+(a.respondRate?' Era '+a.respondRate+'% no periodo anterior.':'')});
  else if(m.respondRate<50&&m.total>0)itens.push({i:'&#x1F534;',t:'Taxa de resposta critica ('+m.respondRate+'%)',d:'Reve canal, mensagem e horario do primeiro contato.'});
  if(m.showUpRate>=80&&m.agendou>0)itens.push({i:'&#x2705;',t:'Show-up excelente ('+m.showUpRate+'%)',d:'Confirmacao funcionando bem.'});
  else if(m.showUpRate<60&&m.agendou>0)itens.push({i:'&#x26A0;&#xFE0F;',t:'Show-up baixo ('+m.showUpRate+'%)',d:'Confirmacao 24h+1h antes. Considera reuniao online.'});
  if(m.closeRate>=50&&m.compareceu>0)itens.push({i:'&#x2705;',t:'Close rate solido ('+m.closeRate+'%)',d:'Reuniao converte bem. Foca no volume que chega a reuniao.'});
  else if(m.closeRate<30&&m.compareceu>0)itens.push({i:'&#x1F534;',t:'Close rate fraco ('+m.closeRate+'%)',d:'Reve apresentacao e tratamento de objecoes.'});
  if(m.valorTotal>0)itens.push({i:'&#x1F4B0;',t:'Receita de '+(fmtM(m.valorTotal)||'-')+' no periodo',d:'Ticket medio '+(fmtM(m.tMedio)||'-')+'.'+(a.valorTotal?' Periodo anterior: '+(fmtM(a.valorTotal)||'-')+'.':'')});
  if(!itens.length)itens.push({i:'&#x2139;&#xFE0F;',t:'Sem dados suficientes',d:'Adiciona leads na planilha para activar o diagnostico.'});
  document.getElementById('diag').innerHTML=itens.map(function(x){return'<div class="di"><span style="font-size:1.1rem;flex-shrink:0;margin-top:1px">'+x.i+'</span><div><div class="dit">'+x.t+'</div><div class="did">'+x.d+'</div></div></div>';}).join('');
}

function rLeads(leads){
  var el=document.getElementById('leads');
  document.getElementById('conv-ct').textContent=leads.length?'('+leads.length+')':'';
  if(!leads.length){el.innerHTML='<div class="empty">Nenhum lead em conversa ativa.</div>';return;}
  var html='<table class="ltable"><tr><th>Nome</th><th>Telefone</th><th>Chegada</th><th>Tratativa</th></tr>';
  leads.forEach(function(l){
    html+='<tr><td style="font-weight:600">'+l.nome+'</td><td><a class="btn-wa" href="https://wa.me/55'+l.tel.replace(/\D/g,'')+'" target="_blank">&#x1F4F1; '+l.tel+'</a></td><td style="color:#5A5E6B;font-size:.75rem">'+l.chegada+'</td><td style="color:#5A5E6B;font-size:.73rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+l.tratativa+'</td></tr>';
  });
  html+='</table>';
  el.innerHTML=html;
}

function fetchCSV(sid,aba){
  // Use 'default' as special keyword to fetch the first sheet without specifying tab name
  var sheetParam=aba&&aba!=='default'?'&sheet='+encodeURIComponent(aba):'';
  var url='https://docs.google.com/spreadsheets/d/'+sid+'/gviz/tq?tqx=out:csv'+sheetParam;
  var controller=new AbortController();
  var timer=setTimeout(function(){controller.abort();},12000);
  return fetch(url,{signal:controller.signal})
    .then(function(r){clearTimeout(timer);if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
    .then(function(txt){return parseCSV(txt);})
    .catch(function(e){clearTimeout(timer);if(e.name==='AbortError')throw new Error('Tempo esgotado ao carregar a aba: '+aba);throw e;});
}

function renderMes(cliente,aba){
  document.querySelectorAll('.mes-btn').forEach(function(b){b.classList.toggle('ativo',b.dataset.aba===aba);});
  var idx=cliente.abas.indexOf(aba);
  var abaAnt=idx>0?cliente.abas[idx-1]:null;
  var empty={rows:[],cols:COL_DEFAULT};
  return Promise.all([
    fetchCSV(cliente.sheets_id,aba),
    abaAnt?fetchCSV(cliente.sheets_id,abaAnt).catch(function(){return empty;}):Promise.resolve(empty)
  ]).then(function(results){
    var m=calcular(results[0]);
    var ant=(results[1]&&results[1].rows&&results[1].rows.length)?calcular(results[1]):null;
    if(cliente.custo_por_lead&&m.fechou>0)m._custoVenda=Math.round(m.total*cliente.custo_por_lead/m.fechou);
    rAlertas(m);rMetrics(m,ant);
    rFunil(m);rChart(m);rFontes(m);rMedidas(m,null);rDiag(m,ant);rLeads(m.emConversa);
  });
}

function showError(title,msg){
  document.getElementById('loading').style.display='none';
  document.getElementById('error-wrap').style.display='flex';
  document.getElementById('err-title').textContent=title;
  document.getElementById('err-msg').textContent=msg;
}

function init(){
  var params=new URLSearchParams(window.location.search);
  var cid=params.get('cliente');
  if(!cid){showError('Cliente nao especificado','Adicione ?cliente=ID na URL. Ex: ?cliente=arte-azulejo');return;}

  // Timeout fallback — if init hangs for 20s, show error
  var initTimeout=setTimeout(function(){showError('Tempo esgotado','Nao foi possivel carregar os dados. Verifica a ligacao a internet e que a planilha esta publica.');},20000);

  fetch('clientes.json')
    .then(function(r){if(!r.ok)throw new Error('clientes.json nao encontrado (HTTP '+r.status+')');return r.json();})
    .then(function(clientes){
      var cliente=clientes.find(function(c){return c.id===cid;});
      if(!cliente)throw new Error('Cliente "'+cid+'" nao encontrado em clientes.json');
      clearTimeout(initTimeout);
      document.getElementById('cliente-nome').textContent=cliente.nome;
      var metaInfo=[];
      if(cliente.meta_fechamentos)metaInfo.push('Meta: '+cliente.meta_fechamentos+' fechamentos');
      if(cliente.meta_receita)metaInfo.push('Meta: '+(fmtM(cliente.meta_receita)||'-'));
      if(metaInfo.length)document.getElementById('cliente-sub').textContent=metaInfo.join(' · ');
      var abaInicial=cliente.abas[cliente.abas.length-1];
      document.getElementById('mes-selector').innerHTML=cliente.abas.map(function(a){
        return'<button class="mes-btn'+(a===abaInicial?' ativo':'')+'" data-aba="'+a+'">'+a+'</button>';
      }).join('');
      document.getElementById('mes-selector').addEventListener('click',function(e){
        if(e.target.classList.contains('mes-btn'))renderMes(cliente,e.target.dataset.aba);
      });
      document.getElementById('loading').style.display='none';
      document.getElementById('app').style.display='block';
      return renderMes(cliente,abaInicial);
    })
    .catch(function(e){clearTimeout(initTimeout);showError('Erro ao carregar',e.message);});
}

init();
</script>
